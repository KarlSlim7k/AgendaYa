name: agenda_ya
description: "Aplicación móvil para gestión de citas empresariales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.2
  
  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Security
  local_auth: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # External actions
  url_launcher: ^6.3.0
  
  # Date & Time
  intl: ^0.20.2
  
  # Utils
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
