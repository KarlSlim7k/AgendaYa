<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgendaYa | Sin conexión</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1526;
      color: #f0f4ff;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.6rem;
    }
    p {
      margin: 0;
      color: #b9c8e4;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sin conexión</h1>
    <p>No pudimos conectarnos a AgendaYa. Intenta nuevamente cuando tengas internet.</p>
  </div>
</body>
</html>
