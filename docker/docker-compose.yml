# ============================================
# Docker Compose - SOLO DESARROLLO LOCAL
# ============================================
# NO USAR EN PRODUCCIÓN (Neubox Tellit)
# Este archivo es para desarrollo local únicamente
# ============================================

version: '3.8'

services:
  # MariaDB 11.4.9 (igual a producción Neubox)
  mariadb:
    image: mariadb:11.4.9
    container_name: citas_mariadb_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: citas_empresariales
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3307:3306"  # Puerto 3307 local para no conflictar con otras instalaciones
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d  # Scripts de inicialización
    networks:
      - citas_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP 8.2-FPM (igual a producción Neubox)
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citas_php_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html  # Monta el proyecto completo
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - citas_network
    depends_on:
      mariadb:
        condition: service_healthy

  # Nginx (servidor web)
  nginx:
    image: nginx:alpine
    container_name: citas_nginx_dev
    restart: unless-stopped
    ports:
      - "8081:80"  # http://localhost:8081
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - citas_network
    depends_on:
      - php

  # Redis (para cache y queues)
  redis:
    image: redis:7-alpine
    container_name: citas_redis_dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - citas_network
    command: redis-server --appendonly yes

  # MailHog (para testing de emails en desarrollo)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: citas_mailhog_dev
    restart: unless-stopped
    ports:
      - "8025:8025"  # UI: http://localhost:8025
      - "1025:1025"  # SMTP
    networks:
      - citas_network

networks:
  citas_network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
