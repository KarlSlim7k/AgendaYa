name: phase6-quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  laravel-tests:
    name: Laravel Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit
        run: php artisan test

  mobile-tests:
    name: Mobile Unit + Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test test/

      - name: Integration tests (mock API)
        run: |
          flutter test integration_test/phase6_booking_mock_api_test.dart
          flutter test integration_test/phase6_profile_mock_api_test.dart
          flutter test integration_test/phase6_notifications_mock_api_test.dart

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Validate APK size budget
        run: bash scripts/check_size_budget.sh build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agendaya-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  web-browser-matrix:
    name: Web Browser Matrix (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser binaries
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Start static server
        run: |
          php -S 127.0.0.1:8088 -t public > /tmp/public-server.log 2>&1 &
          echo $! > /tmp/public-server.pid
          sleep 2

      - name: Run browser smoke test
        env:
          BROWSER: ${{ matrix.browser }}
          BASE_URL: http://127.0.0.1:8088
        run: node tests/browser/smoke.cjs

      - name: Stop static server
        if: always()
        run: |
          if [ -f /tmp/public-server.pid ]; then
            kill $(cat /tmp/public-server.pid) || true
          fi

  lighthouse-audit:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: web-browser-matrix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start static server
        run: |
          php -S 127.0.0.1:8088 -t public > /tmp/public-server.log 2>&1 &
          echo $! > /tmp/public-server.pid
          sleep 2

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop static server
        if: always()
        run: |
          if [ -f /tmp/public-server.pid ]; then
            kill $(cat /tmp/public-server.pid) || true
          fi
